services:
  postgres:
    image: postgres:16
    container_name: catalogo_postgres

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: catalogo

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database:/app/database:ro
      - ../database/init:/docker-entrypoint-initdb.d:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d catalogo"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: